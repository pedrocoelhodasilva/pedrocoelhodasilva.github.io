<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ecce Homo Farricocos 2026</title>

    <!-- Set the publication date ONCE per post -->
    <meta name="published" content="2026-04-06">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div id="navbar"></div>
<script>
  fetch("../assets/components/navbar.html")
    .then(res => res.text())
    .then(html => document.getElementById("navbar").innerHTML = html);
</script>

<main style="padding: 1rem; max-width: 700px; margin: auto;">

    <h1>Segundo post: Procissão Ecce Homo 2026 - Memória Futura</h1>

    <figure style="text-align:center; margin: 1.5rem 0;">
      <img src="../assets/img/farricoco2026.png"
           alt="Ecce Homo Farricocos 2026"
           style="max-width:100%; height:auto;">
      <figcaption style="font-size:0.9rem; color:#777; margin-top:0.5rem;">
        Ecce Homo Farricocos 2026
      </figcaption>
    </figure>


    <!-- Automatic date output -->
    <p id="post-dates" style="color:#777; font-size:0.9rem;"></p>

    <script>
      const published = new Date(
        document.querySelector('meta[name="published"]').content
      );

      const updated = new Date(document.lastModified);

      const fmt = d => d.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      let text = `Published on ${fmt(published)}`;

      if (updated - published > 24 * 60 * 60 * 1000) {
        text += ` • Last updated ${fmt(updated)}`;
      }

      document.getElementById("post-dates").textContent = text;
    </script>

    <!-- POST CONTENT GOES HERE -->
    <p>2 de Abril de 2026, o dia em que os Farricocos voltaram a sair à rua com os fogaréus iluminados. Eu estive lá.</p>

    <p><a href="../blog.html">← Back to Blog</a></p>
</main>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const menu = document.querySelector('.nav-menu');
  toggle.addEventListener('click', () => {
    menu.classList.toggle('active');
  });
</script>

</body>
</html>
